name: ayesha_candidate_management
description: "A production-ready Android tablet application for recruiter candidate management."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Local Database
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.2
  path: ^1.8.3
  
  # Autocomplete Cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI & Components
  data_table_2: ^2.3.12
  flutter_typeahead: ^4.8.0
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  
  # Stylus/Handwriting
  google_mlkit_digital_ink_recognition: ^0.11.0
  signature: ^5.4.0
  
  # Export features
  csv: ^6.0.0
  share_plus: ^7.2.1
  permission_handler: ^11.3.0
  
  # Utilities
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  drift_dev: ^2.14.1
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
